name: Sync Garmin to Notion

on:
  schedule:
    - cron: '0 1 * * *'  # Runs at 01:00
  workflow_dispatch:

env:
  TZ: 'America/Montreal'
  GARMINTOKENS: .garminconnect

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Restore Garmin tokens
        id: garmin-cache
        uses: actions/cache/restore@v4
        with:
          path: .garminconnect
          key: ${{ runner.os }}-garmin-tokens-v2
          restore-keys: |
            ${{ runner.os }}-garmin-tokens-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run sync scripts
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PR_DB_ID: ${{ secrets.NOTION_PR_DB_ID }}
          NOTION_STEPS_DB_ID: ${{ secrets.NOTION_STEPS_DB_ID }}
          NOTION_SLEEP_DB_ID: ${{ secrets.NOTION_SLEEP_DB_ID }}
          TZ: 'America/Montreal'
          GARMINTOKENS: .garminconnect
        run: |
          python garmin-activities.py
          python personal-records.py
          python daily-steps.py
          python sleep-data.py

      - name: Save Garmin tokens
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .garminconnect
          key: ${{ runner.os }}-garmin-tokens-v2
